# all services

services:
  auth-service:
    build: ./users
    container_name: auth-service
    ports:
      - "8000:8000"
    depends_on:
      - auth-db
      - auth-celery
      - rabbitmq
      - redis
    environment:
      DB_NAME: trello_auth
      DB_USER: postgres
      DB_PASSWORD: 12345
      DB_HOST: auth-db
      DB_PORT: 5432
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./users:/app
  auth-db:
    image: postgres:16
    container_name: auth_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: trello_auth
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  tasks-db:
    image: postgres:16
    container_name: tasks_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: trello_tasks
    volumes:
      - tasks_db_data:/var/lib/postgresql/data

  tasks-service:
    build: ./tasks
    container_name: tasks-service
    ports:
      - "8001:8001"
    depends_on:
      - tasks-db
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      DEBUG: True
      DATABASE_URL: postgresql://postgres:12345@tasks-db:5432/trello_tasks

    volumes:
      - ./tasks:/app

  redis:
    image: redis:7.4.7-alpine
    container_name: redis-service
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4.2.1-management
    container_name: rabbitmq-service
    ports:
      - "5672:5672"
      - "15672:15672" # managment ui
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  auth-celery:
    build: ./users
    container_name: auth-celery
    depends_on:
      - redis
      - rabbitmq
      - auth-db
    environment:
      DB_NAME: trello_auth
      DB_USER: postgres
      DB_PASSWORD: 12345
      DB_HOST: auth-db
      DB_PORT: 5432
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: sh -c "celery -A users worker --loglevel=info"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auth_pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - auth-db

  mongodb:
    image: mongo
    container_name: history_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  history-service:
    build: ./history
    container_name: trello_history
    ports:
      - "8003:8003"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    volumes:
      - ./history:/app
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=trello_history
      - HOST=0.0.0.0
      - PORT=8003
      - DEBUG=True
      - CELERY_BACKEND=redis://redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  history-celery-worker:
    build: ./history
    container_name: trello_history_celery_worker
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=trello_history
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - mongodb
      - rabbitmq
    volumes:
      - ./history:/app
    command: celery -A app.tasks.event_tasks worker --loglevel=info --queues=history
volumes:
  auth_db_data:
  tasks_db_data:
  mongodb_data:
